name: Dress Orbit 分析

on:
  schedule:
    # 每周一 UTC 00:00 自动运行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      left_repo:
        description: '中心仓库（owner/repo 格式）'
        required: false
        default: 'Cute-Dress/Dress'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --python 3.12

      - name: Run Dress orbit analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run analyze.py \
            --base-repo "${{ github.event.inputs.left_repo || 'Cute-Dress/Dress' }}"

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md dress_orbit.json dress_orbit.svg
          git diff --staged --quiet \
            || git commit -m "chore: update Dress orbit analysis [skip ci]"
          git push
