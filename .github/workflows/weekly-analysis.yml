name: 贡献者重合度分析

on:
  schedule:
    # 每周一 UTC 00:00 自动运行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      left_repo:
        description: '左侧仓库（owner/repo 格式）'
        required: false
        default: 'Cute-Dress/Dress'
      right_repo:
        description: '右侧仓库（owner/repo 格式）'
        required: false
        default: 'OI-wiki/OI-wiki'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run contributor overlap analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python analyze.py \
            "${{ github.event.inputs.left_repo || 'Cute-Dress/Dress' }}" \
            "${{ github.event.inputs.right_repo || 'OI-wiki/OI-wiki' }}"

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md contributor_overlap.json
          git diff --staged --quiet \
            || git commit -m "chore: update contributor overlap analysis [skip ci]"
          git push
